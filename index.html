<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A1A2E">
    <title>Barbearia-RM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- ===== FIREBASE SDKs ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #1F2937;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
            padding: 20px 16px 16px;
            text-align: center;
            border-bottom: 4px solid #E94560;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '✂️';
            position: absolute;
            font-size: 120px;
            right: -20px;
            top: -30px;
            opacity: 0.05;
            transform: rotate(-15deg);
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        
        .header-subtitle {
            font-size: 13px;
            color: #E94560;
            font-weight: 500;
            margin-top: 2px;
            position: relative;
            z-index: 1;
        }
        
        /* ===== TELAS ===== */
        .screen {
            display: none;
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }
        
        .screen.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: 0.3s;
            border: 1px solid rgba(233, 69, 96, 0.05);
        }
        
        .card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-color: rgba(233, 69, 96, 0.15);
        }
        
        .input-group {
            margin-bottom: 14px;
        }
        
        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: #4B5563;
            margin-bottom: 4px;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            background: #f9fafb;
            transition: 0.3s;
            font-family: inherit;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #E94560;
            background: white;
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 8px;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #E94560, #c73652);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.25);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.35);
        }
        
        .btn-outline {
            background: transparent;
            color: #1A1A2E;
            border: 2px solid #e5e7eb;
        }
        
        .btn-outline:hover {
            background: #f3f4f6;
            border-color: #E94560;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
        }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            margin-bottom: 0;
            border-radius: 8px;
            width: auto;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: none;
            justify-content: space-around;
            padding: 8px 0 12px;
            border-top: 1px solid #e5e7eb;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
            z-index: 100;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .nav-item {
            background: none;
            border: none;
            text-align: center;
            font-size: 10px;
            color: #9CA3AF;
            cursor: pointer;
            padding: 4px 12px;
            transition: 0.3s;
            font-family: inherit;
        }
        
        .nav-item.active {
            color: #E94560;
        }
        
        .nav-item .nav-icon {
            font-size: 22px;
            display: block;
            margin-bottom: 1px;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 300;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            max-width: 90%;
            text-align: center;
            animation: slideDown 0.3s ease;
            display: none;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* ===== ESTILOS DO AGENDAMENTO ===== */
        .horarios-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .btn-horario {
            padding: 10px 20px;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            min-width: 70px;
            transition: 0.3s;
            font-family: inherit;
            flex: 1;
        }
        
        .btn-horario:hover {
            background: #e5e7eb;
            transform: scale(1.02);
        }
        
        .btn-horario.selecionado {
            background: #E94560;
            border-color: #E94560;
            color: white;
        }
        
        .btn-horario.indisponivel {
            background: #f3f4f6;
            color: #9CA3AF;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .btn-horario.indisponivel:hover {
            transform: none;
        }
        
        /* ===== LISTA DE AGENDAMENTOS ===== */
        .agendamento-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .agendamento-item:last-child {
            border-bottom: none;
        }
        
        .agendamento-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .agendamento-status.pendente {
            background: #fef3c7;
            color: #92400e;
        }
        
        .agendamento-status.confirmado {
            background: #d1fae5;
            color: #065f46;
        }
        
        .agendamento-status.cancelado {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .agendamento-status.concluido {
            background: #dbeafe;
            color: #1e40af;
        }
        
        /* ===== PERFIL ===== */
        .profile-header {
            text-align: center;
            padding: 30px 20px 20px;
            background: white;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(233, 69, 96, 0.05);
            position: relative;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #dbeafe;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
            cursor: pointer;
            border: 3px solid #E94560;
            transition: 0.3s;
            overflow: hidden;
        }
        
        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .camera-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #E94560;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            border: 2px solid white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeIn 0.25s ease;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            background: #e5e7eb;
            color: #6B7280;
            transition: 0.3s;
            font-family: inherit;
        }
        
        .tab.active {
            background: #1A1A2E;
            color: white;
        }
        
        /* ===== RESPONSIVO ===== */
        @media (max-width: 500px) {
            .header-title { font-size: 20px; }
            .screen { padding: 12px; }
            .card { padding: 16px; }
            .btn-horario { min-width: 60px; font-size: 12px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="header-title">✂️ Barbearia-RM</div>
    <div class="header-subtitle">Agende seu corte com estilo</div>
</div>

<!-- ===== LOGIN ===== -->
<div class="screen active" id="loginScreen">
    <div style="text-align:center;margin:20px 0 30px 0;">
        <div style="font-size:60px;">✂️</div>
        <h2 style="color:#1A1A2E;margin-top:5px;">Barbearia-RM</h2>
        <p style="color:#E94560;font-weight:600;">Agende seu horário</p>
    </div>
    <div class="card">
        <div class="input-group"><div class="input-label">📧 E-mail</div><input type="email" class="input-field" id="loginEmail" placeholder="Digite seu e-mail"></div>
        <div class="input-group"><div class="input-label">🔒 Senha</div><input type="password" class="input-field" id="loginSenha" placeholder="Digite sua senha"></div>
        <button class="btn btn-primary" onclick="fazerLogin()">🔑 ENTRAR</button>
        <button class="btn btn-outline" onclick="mostrarTela('cadastroScreen')">📝 Criar Conta</button>
    </div>
</div>

<!-- ===== CADASTRO ===== -->
<div class="screen" id="cadastroScreen">
    <h2 style="text-align:center;color:#1A1A2E;">CRIAR CONTA</h2>
    <div class="card">
        <div class="input-group"><div class="input-label">👤 Nome</div><input type="text" class="input-field" id="cadNome"></div>
        <div class="input-group"><div class="input-label">📧 E-mail</div><input type="email" class="input-field" id="cadEmail"></div>
        <div class="input-group"><div class="input-label">📱 Celular</div><input type="tel" class="input-field" id="cadCelular" placeholder="(11)99999-9999"></div>
        <div class="input-group"><div class="input-label">🔒 Senha</div><input type="password" class="input-field" id="cadSenha" placeholder="Mínimo 6"></div>
        <button class="btn btn-primary" onclick="cadastrar()">✅ FINALIZAR</button>
        <button class="btn btn-outline" onclick="mostrarTela('loginScreen')">← Voltar</button>
    </div>
</div>

<!-- ===== HOME ===== -->
<div class="screen" id="homeScreen">
    <div class="card" style="text-align:center;background:linear-gradient(135deg, #1A1A2E, #16213E);color:white;border:none;">
        <div style="font-size:40px;">✂️</div>
        <h2 style="color:white;">Bem-vindo!</h2>
        <p style="color:#E94560;margin-top:4px;">Agende seu horário conosco</p>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="mudarTab('agendar',this)">📅 Agendar</button>
        <button class="tab" onclick="mudarTab('meus',this)">📋 Meus Agendamentos</button>
        <button class="tab" onclick="mudarTab('historico',this)">📜 Histórico</button>
    </div>
    
    <div id="agendarTab"><div id="agendamentoContainer"></div></div>
    <div id="meusTab" style="display:none;"><div id="meusAgendamentosContainer"></div></div>
    <div id="historicoTab" style="display:none;"><div id="historicoContainer"></div></div>
</div>

<!-- ===== PERFIL ===== -->
<div class="screen" id="perfilScreen">
    <div class="profile-header">
        <div class="profile-avatar" onclick="document.getElementById('perfilFoto').click()"><span id="perfilAvatarDefault">👤</span><div class="camera-icon">📷</div></div>
        <input type="file" id="perfilFoto" accept="image/*" style="display:none" onchange="mudarFotoPerfil(event)">
        <h2 id="perfilNome" style="color:#1A1A2E;">Seu Nome</h2>
        <p id="perfilEmail" style="color:#6B7280;">seu@email.com</p>
        <p id="perfilCelular" style="color:#6B7280;font-size:14px;"></p>
    </div>
    <div class="card">
        <h3>✏️ EDITAR PERFIL</h3>
        <div class="input-group"><div class="input-label">👤 Nome</div><input type="text" class="input-field" id="editNome"></div>
        <div class="input-group"><div class="input-label">📱 Celular</div><input type="tel" class="input-field" id="editCelular"></div>
        <div class="input-group"><div class="input-label">📧 E-mail</div><input type="email" class="input-field" id="editEmail"></div>
        <button class="btn btn-primary" onclick="salvarPerfil()">💾 SALVAR</button>
    </div>
    <button class="btn btn-danger" onclick="sair()">🚪 SAIR</button>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav" id="bottomNav" style="display:none;">
    <button class="nav-item active" onclick="mostrarTela('homeScreen')"><div class="nav-icon">🏠</div>Início</button>
    <button class="nav-item" onclick="mostrarTela('perfilScreen')"><div class="nav-icon">👤</div>Perfil</button>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ========================================================== -->
<!-- ===== JAVASCRIPT COMPLETO ===== -->
<!-- ========================================================== -->
<script>
// ==========================================================
// ===== CONFIGURAÇÃO DO FIREBASE =====
// ==========================================================
const firebaseConfig = {
    apiKey: "AIzaSyB_HKuYMVnBn_rhKfvazjs-7SCmb9NOrDQ",
    authDomain: "construtorlpx.firebaseapp.com",
    projectId: "construtorlpx",
    storageBucket: "construtorlpx.firebasestorage.app",
    messagingSenderId: "247671839031",
    appId: "1:247671839031:web:1a4ecfdd28c02b802fa2b2",
    measurementId: "G-3J4XN3K2PG"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.enablePersistence()
    .then(() => console.log('🔥 Firestore cache ativado!'))
    .catch(err => console.warn('⚠️ Erro ao ativar cache:', err));

console.log('🔥 Firebase conectado!');

// ==========================================================
// ===== VARIÁVEIS GLOBAIS =====
// ==========================================================
var usuarioLogado = null;
var horariosDisponiveis = ['09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00'];

// ==========================================================
// ===== FUNÇÕES FIREBASE =====
// ==========================================================

// --- SALVAR USUÁRIO ---
async function salvarUsuarioFirebase(usuario) {
    try {
        await db.collection('usuariosBarbearia').doc(usuario.id.toString()).set(usuario);
        return true;
    } catch (error) {
        console.error('❌ Erro ao salvar usuário:', error);
        mostrarToast('Erro ao salvar usuário!', 'erro');
        return false;
    }
}

// --- BUSCAR USUÁRIO POR EMAIL ---
async function buscarUsuarioPorEmail(email) {
    try {
        const snapshot = await db.collection('usuariosBarbearia')
            .where('email', '==', email.trim())
            .get();
        
        if (!snapshot.empty) {
            const doc = snapshot.docs[0];
            return { id: parseInt(doc.id), ...doc.data() };
        }
        return null;
    } catch (error) {
        console.error('❌ Erro ao buscar usuário:', error);
        return null;
    }
}

// --- BUSCAR USUÁRIO POR ID ---
async function buscarUsuarioPorId(id) {
    try {
        const doc = await db.collection('usuariosBarbearia').doc(id.toString()).get();
        if (doc.exists) {
            return { id: parseInt(doc.id), ...doc.data() };
        }
        return null;
    } catch (error) {
        console.error('❌ Erro ao buscar usuário:', error);
        return null;
    }
}

// --- ATUALIZAR USUÁRIO ---
async function atualizarUsuarioFirebase(id, dados) {
    try {
        await db.collection('usuariosBarbearia').doc(id.toString()).update(dados);
        return true;
    } catch (error) {
        console.error('❌ Erro ao atualizar usuário:', error);
        return false;
    }
}

// --- SALVAR AGENDAMENTO ---
async function salvarAgendamentoFirebase(agendamento) {
    try {
        await db.collection('agendamentosBarbearia').doc(agendamento.id.toString()).set(agendamento);
        return true;
    } catch (error) {
        console.error('❌ Erro ao salvar agendamento:', error);
        mostrarToast('Erro ao salvar agendamento!', 'erro');
        return false;
    }
}

// --- BUSCAR AGENDAMENTOS DO USUÁRIO ---
async function buscarAgendamentosUsuario(usuarioId) {
    try {
        const snapshot = await db.collection('agendamentosBarbearia')
            .where('usuarioId', '==', usuarioId)
            .orderBy('data', 'desc')
            .orderBy('hora', 'desc')
            .get();
        return snapshot.docs.map(doc => ({ id: parseInt(doc.id), ...doc.data() }));
    } catch (error) {
        console.error('❌ Erro ao buscar agendamentos:', error);
        return [];
    }
}

// --- BUSCAR TODOS AGENDAMENTOS ---
async function buscarTodosAgendamentos() {
    try {
        const snapshot = await db.collection('agendamentosBarbearia')
            .orderBy('data', 'asc')
            .orderBy('hora', 'asc')
            .get();
        return snapshot.docs.map(doc => ({ id: parseInt(doc.id), ...doc.data() }));
    } catch (error) {
        console.error('❌ Erro ao buscar agendamentos:', error);
        return [];
    }
}

// --- BUSCAR HORÁRIOS DISPONÍVEIS ---
async function buscarHorariosDisponiveis(data) {
    try {
        const snapshot = await db.collection('agendamentosBarbearia')
            .where('data', '==', data)
            .where('status', 'in', ['pendente', 'confirmado'])
            .get();
        
        const ocupados = snapshot.docs.map(doc => doc.data().hora);
        return horariosDisponiveis.filter(h => !ocupados.includes(h));
    } catch (error) {
        console.error('❌ Erro ao buscar horários:', error);
        return horariosDisponiveis;
    }
}

// ==========================================================
// ===== FUNÇÕES DE NAVEGAÇÃO =====
// ==========================================================

function mostrarTela(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    var nav = document.getElementById('bottomNav');
    if (nav) nav.style.display = ['homeScreen', 'perfilScreen'].includes(id) ? 'flex' : 'none';
    
    if (id === 'homeScreen') {
        carregarAgendamentos();
    }
    if (id === 'perfilScreen') carregarMeuPerfil();
}

function mostrarToast(mensagem, tipo) {
    var toast = document.getElementById('toast');
    toast.textContent = mensagem;
    toast.style.background = tipo === 'erro' ? '#EF4444' : tipo === 'sucesso' ? '#10B981' : '#1F2937';
    toast.style.display = 'block';
    setTimeout(function() { toast.style.display = 'none'; }, 3000);
}

function mudarTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('agendarTab').style.display = tab === 'agendar' ? 'block' : 'none';
    document.getElementById('meusTab').style.display = tab === 'meus' ? 'block' : 'none';
    document.getElementById('historicoTab').style.display = tab === 'historico' ? 'block' : 'none';
    
    if (tab === 'agendar') carregarAgendamentos();
    if (tab === 'meus') carregarMeusAgendamentos();
    if (tab === 'historico') carregarHistorico();
}

// ==========================================================
// ===== LOGIN E CADASTRO =====
// ==========================================================

async function fazerLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var senha = document.getElementById('loginSenha').value;

    if (!email || !senha) {
        mostrarToast('Preencha todos os campos!', 'erro');
        return;
    }

    var usuario = await buscarUsuarioPorEmail(email);
    
    if (usuario && usuario.senha === senha) {
        usuarioLogado = usuario;
        mostrarToast('Bem-vindo, ' + usuario.nome + '!', 'sucesso');
        setTimeout(function() { mostrarTela('homeScreen'); }, 500);
    } else {
        mostrarToast('E-mail ou senha inválidos!', 'erro');
    }
}

async function cadastrar() {
    var nome = document.getElementById('cadNome').value.trim();
    var email = document.getElementById('cadEmail').value.trim();
    var celular = document.getElementById('cadCelular').value.trim();
    var senha = document.getElementById('cadSenha').value;

    if (!nome || !email || !celular || !senha) {
        mostrarToast('Preencha todos os campos!', 'erro');
        return;
    }

    if (senha.length < 6) {
        mostrarToast('Senha mínima de 6 caracteres!', 'erro');
        return;
    }

    if (!email.includes('@')) {
        mostrarToast('E-mail inválido!', 'erro');
        return;
    }

    var existe = await buscarUsuarioPorEmail(email);
    if (existe) {
        mostrarToast('E-mail já cadastrado!', 'erro');
        return;
    }

    var novoUsuario = {
        id: Date.now(),
        nome: nome,
        email: email,
        celular: celular,
        senha: senha,
        fotoPerfil: '',
        dataCriacao: new Date().toISOString()
    };

    var salvou = await salvarUsuarioFirebase(novoUsuario);
    if (!salvou) {
        mostrarToast('Erro ao salvar!', 'erro');
        return;
    }

    usuarioLogado = novoUsuario;
    mostrarToast('Cadastro realizado!', 'sucesso');
    setTimeout(function() { mostrarTela('homeScreen'); }, 500);
}

// ===== PERFIL =====
// ==========================================================

function carregarMeuPerfil() {
    if (!usuarioLogado) return;
    document.getElementById('perfilNome').textContent = usuarioLogado.nome;
    document.getElementById('perfilEmail').textContent = usuarioLogado.email;
    document.getElementById('perfilCelular').textContent = '📱 ' + (usuarioLogado.celular || 'Não informado');
    document.getElementById('editNome').value = usuarioLogado.nome || '';
    document.getElementById('editCelular').value = usuarioLogado.celular || '';
    document.getElementById('editEmail').value = usuarioLogado.email || '';
    
    if (usuarioLogado.fotoPerfil) {
        document.getElementById('perfilAvatarDefault').innerHTML = 
            '<img src="' + usuarioLogado.fotoPerfil + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
    }
}

async function salvarPerfil() {
    if (!usuarioLogado) return;

    usuarioLogado.nome = document.getElementById('editNome').value.trim();
    usuarioLogado.celular = document.getElementById('editCelular').value.trim();
    usuarioLogado.email = document.getElementById('editEmail').value.trim();

    var atualizado = await atualizarUsuarioFirebase(usuarioLogado.id, {
        nome: usuarioLogado.nome,
        celular: usuarioLogado.celular,
        email: usuarioLogado.email
    });

    if (atualizado) {
        mostrarToast('✅ Perfil atualizado!', 'sucesso');
        carregarMeuPerfil();
    } else {
        mostrarToast('Erro ao atualizar perfil!', 'erro');
    }
}

function mudarFotoPerfil(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = async function(ev) {
        var fotoBase64 = ev.target.result;
        document.getElementById('perfilAvatarDefault').innerHTML = 
            '<img src="' + fotoBase64 + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
        
        usuarioLogado.fotoPerfil = fotoBase64;
        await atualizarUsuarioFirebase(usuarioLogado.id, { fotoPerfil: fotoBase64 });
        mostrarToast('✅ Foto atualizada!', 'sucesso');
    };
    reader.readAsDataURL(file);
}

    var container = document.getElementById('agendamentoContainer');
    if (!container) return;
    
    var hoje = new Date().toISOString().split('T')[0];
    
    container.innerHTML = `
        <div class="card">
            <h3 style="text-align:center;color:#1A1A2E;margin-bottom:16px;">✂️ AGENDAR CORTE</h3>
            <div class="input-group">
                <div class="input-label">👤 Seu Nome</div>
                <input type="text" class="input-field" id="clienteNome" placeholder="Digite seu nome" value="${usuarioLogado ? usuarioLogado.nome : ''}">
            </div>
            <div class="input-group">
                <div class="input-label">📱 Telefone</div>
                <input type="tel" class="input-field" id="clienteTelefone" placeholder="(11)99999-9999" value="${usuarioLogado ? usuarioLogado.celular : ''}">
            </div>
            <div class="input-group">
                <div class="input-label">✂️ Serviço</div>
                <select class="input-field" id="servicoSelect">
                    <option value="corte_masculino">💇 Corte Masculino</option>
                    <option value="corte_feminino">💇‍♀️ Corte Feminino</option>
                    <option value="barba">🧔 Barba</option>
                    <option value="combo">✨ Combo (Corte + Barba)</option>
                    <option value="sobrancelha">👁️ Sobrancelha</option>
                    <option value="manicure">💅 Manicure</option>
                    <option value="hidratacao">💧 Hidratação</option>
                    <option value="progressiva">✨ Progressiva</option>
                </select>
            </div>
            <div class="input-group">
                <div class="input-label">📅 Data</div>
                <input type="date" class="input-field" id="dataInput" min="${hoje}" onchange="carregarHorariosDisponiveis(this.value)">
            </div>
            <div class="input-group">
                <div class="input-label">🕐 Horários Disponíveis</div>
                <div id="horariosContainer" class="horarios-grid">
                    <p style="color:#6B7280;width:100%;font-size:14px;">Selecione uma data para ver os horários.</p>
                </div>
                <input type="hidden" id="horaSelecionada">
            </div>
            <button class="btn btn-primary" onclick="confirmarAgendamento()">📅 CONFIRMAR AGENDAMENTO</button>
        </div>
    `;
}

async function carregarHorariosDisponiveis(data) {
    var container = document.getElementById('horariosContainer');
    if (!container) return;
    
    if (!data) {
        container.innerHTML = '<p style="color:#6B7280;width:100%;font-size:14px;">Selecione uma data para ver os horários.</p>';
        return;
    }
    
    var hoje = new Date().toISOString().split('T')[0];
    var horaAtual = new Date().getHours();
    var minutosAtuais = new Date().getMinutes();
    
    var disponiveis = await buscarHorariosDisponiveis(data);
    
    if (data === hoje) {
        disponiveis = disponiveis.filter(function(h) {
            var [hora, minuto] = h.split(':').map(Number);
            return hora > horaAtual || (hora === horaAtual && minuto > minutosAtuais);
        });
    }
    
    if (disponiveis.length === 0) {
        container.innerHTML = '<p style="color:#EF4444;width:100%;font-size:14px;">❌ Nenhum horário disponível para esta data.</p>';
        return;
    }
    
    container.innerHTML = disponiveis.map(function(hora) {
        return `<button class="btn-horario" onclick="selecionarHorario(this, '${hora}')">${hora}</button>`;
    }).join('');
}

function selecionarHorario(btn, hora) {
    document.querySelectorAll('.btn-horario').forEach(b => b.classList.remove('selecionado'));
    btn.classList.add('selecionado');
    document.getElementById('horaSelecionada').value = hora;
}

async function confirmarAgendamento() {
    if (!usuarioLogado) {
        mostrarToast('Faça login para agendar!', 'erro');
        return;
    }

    var cliente = document.getElementById('clienteNome').value.trim();
    var telefone = document.getElementById('clienteTelefone').value.trim();
    var data = document.getElementById('dataInput').value;
    var hora = document.getElementById('horaSelecionada').value;
    var servico = document.getElementById('servicoSelect').value;

    if (!cliente) {
        mostrarToast('❌ Digite seu nome!', 'erro');
        return;
    }
    
    if (!data) {
        mostrarToast('❌ Selecione uma data!', 'erro');
        return;
    }
    
    if (!hora) {
        mostrarToast('❌ Selecione um horário!', 'erro');
        return;
    }
    
    if (!servico) {
        mostrarToast('❌ Selecione um serviço!', 'erro');
        return;
    }
    
    var disponiveis = await buscarHorariosDisponiveis(data);
    if (!disponiveis.includes(hora)) {
        mostrarToast('❌ Horário indisponível! Escolha outro.', 'erro');
        return;
    }
    
    try {
        var agendamento = {
            id: Date.now(),
            usuarioId: usuarioLogado.id,
            cliente: cliente,
            telefone: telefone || usuarioLogado.celular || '',
            data: data,
            hora: hora,
            servico: servico,
            status: 'pendente',
            dataCriacao: new Date().toISOString()
        };
        
        var salvou = await salvarAgendamentoFirebase(agendamento);
        if (salvou) {
            mostrarToast('✅ Agendamento realizado com sucesso!', 'sucesso');
            document.getElementById('dataInput').value = '';
            document.getElementById('horaSelecionada').value = '';
            document.getElementById('servicoSelect').value = 'corte_masculino';
            document.getElementById('horariosContainer').innerHTML = '<p style="color:#6B7280;width:100%;font-size:14px;">Selecione uma data para ver os horários.</p>';
            document.querySelectorAll('.btn-horario').forEach(b => b.classList.remove('selecionado'));
            carregarMeusAgendamentos();
        }
    } catch (error) {
        console.error('❌ Erro ao agendar:', error);
        mostrarToast('❌ Erro ao agendar! Tente novamente.', 'erro');
    }
}

async function carregarMeusAgendamentos() {
    var container = document.getElementById('meusAgendamentosContainer');
    if (!container) return;
    
    if (!usuarioLogado) {
        container.innerHTML = '<div class="card"><p style="text-align:center;color:#6B7280;">Faça login para ver seus agendamentos.</p></div>';
        return;
    }
    
    var agendamentos = await buscarAgendamentosUsuario(usuarioLogado.id);
    var ativos = agendamentos.filter(a => a.status === 'pendente' || a.status === 'confirmado');
    
    if (ativos.length === 0) {
        container.innerHTML = `
            <div class="card" style="text-align:center;padding:40px;">
                <div style="font-size:40px;">📅</div>
                <h3 style="color:#1A1A2E;">Nenhum agendamento ativo</h3>
                <p style="color:#6B7280;">Agende seu horário agora mesmo!</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = ativos.map(function(a) {
        var statusClass = a.status === 'pendente' ? 'pendente' : 'confirmado';
        var statusText = a.status === 'pendente' ? '⏳ Pendente' : '✅ Confirmado';
        var servicoLabels = {
            'corte_masculino': '💇 Corte Masculino',
            'corte_feminino': '💇‍♀️ Corte Feminino',
            'barba': '🧔 Barba',
            'combo': '✨ Combo (Corte + Barba)',
            'sobrancelha': '👁️ Sobrancelha',
            'manicure': '💅 Manicure',
            'hidratacao': '💧 Hidratação',
            'progressiva': '✨ Progressiva'
        };
        var servicoLabel = servicoLabels[a.servico] || a.servico;
        
        return `
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:start;">
                    <div>
                        <strong style="color:#1A1A2E;font-size:16px;">${servicoLabel}</strong>
                        <div style="font-size:14px;color:#4B5563;margin-top:4px;">
                            📅 ${a.data} • 🕐 ${a.hora}
                        </div>
                        <div style="font-size:13px;color:#6B7280;margin-top:2px;">
                            👤 ${a.cliente}
                        </div>
                    </div>
                    <span class="agendamento-status ${statusClass}">${statusText}</span>
                </div>
                ${a.status === 'pendente' ? `<button class="btn btn-danger btn-small" onclick="cancelarAgendamento(${a.id})" style="margin-top:10px;width:auto;padding:6px 16px;">❌ Cancelar</button>` : ''}
            </div>
        `;
    }).join('');
}

// ==========================================================
// ===== CANCELAR AGENDAMENTO =====
// ==========================================================

async function cancelarAgendamento(agendamentoId) {
    if (!confirm('Tem certeza que deseja cancelar este agendamento?')) return;
    
    try {
        await db.collection('agendamentosBarbearia').doc(agendamentoId.toString()).update({
            status: 'cancelado'
        });
        mostrarToast('✅ Agendamento cancelado!', 'sucesso');
        carregarMeusAgendamentos();
        carregarHistorico();
    } catch (error) {
        console.error('❌ Erro ao cancelar:', error);
        mostrarToast('Erro ao cancelar!', 'erro');
    }
}
